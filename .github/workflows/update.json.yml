name: Actualizar Resultados Mundial

on:
  schedule:
    - cron: '* * * * *'  # Cada 1 minuto
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run update script
        run: node update-scores.js
        
      - name: Commit cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add partidos.json
          git diff --staged --quiet || git commit -m "Auto: actualizar marcadores"
          git push
